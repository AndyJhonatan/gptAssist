name: Build & Release APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk gptAssist.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gptAssist-apk
          path: gptAssist.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Releases
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: gptAssist última compilación
          body: |
            Descarga directa: gptAssist.apk
          files: gptAssist.apk
          make_latest: "true"
